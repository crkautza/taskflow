<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskflow V1.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
</head> 

<body>
    <div class="container">
        <h1>TaskFlow V1.0</h1>
        <input id="addInput" class="inputTask" type="text" placeholder="Nova Tarefa">
        <button id="createBtn" class="addBtn">Adicionar</button>
        <button id="filterBtn" class="filtros">Filtros</button>
        <ul id="generalList">
        </ul>
        <button hidden id="allBtn" class="filtro" disabled>📋 <span id="countAll" class="counter">0</span> Todas</button>
        <button hidden id="activeBtn" class="filtro">✅ <span id="countActives" class="counter">0</span>Ativas</button>
        <button hidden id="concludedBtn" class="filtro">⏳ <span id="countConcluded" class="counter">0</span>Concluidas</button>
    </div>
    <script src="src/script.js"></script>
</body>

</html>
